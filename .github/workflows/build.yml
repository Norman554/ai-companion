name: Build APK

on: push

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Android SDK
        run: |
          sudo apt install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "build-tools;33.0.0" "platforms;android-33"
      
      - name: Setup Android NDK
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          unzip -q android-ndk-r28c-linux.zip
          mv android-ndk-r28c android-ndk
      
      - run: pip install buildozer
      
      - run: |
          echo y | buildozer init
          sed -i 's/title = .*/title = AI Companion/' buildozer.spec
          sed -i 's/package.name = .*/package.name = aicompanion/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.skip_update = True" >> buildozer.spec
      
      - name: Build APK
        run: |
          export ANDROIDSDK=$HOME/android-sdk
          export ANDROIDNDK=$HOME/android-ndk
          buildozer android debug
      
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
